          # curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
          #   -d "chat_id=${{ secrets.TG_CHAT_ID }}&text=$MSG" > /dev/null

          # ── Integrasi Discord (uncomment + isi secrets) ───
